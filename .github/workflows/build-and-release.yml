# Build the Quarkus native-image backend per OS, wrap it in the Tauri desktop shell, and publish a
# pre-release.
#
# Each OS job: build + smoke-test the GraalVM native-image backend (the same binary the shell spawns),
# stage it as the Tauri app's bundled `backend/` resource (the native image is NOT self-contained — it
# loads companion *.dll/*.so/*.dylib from its own directory), then run `tauri build` to produce the
# platform installer. The shell opens the native window + tray and spawns the backend as a child.
#
#   Windows : Tauri NSIS installer (per-user, no admin; replaces the old Inno Setup .exe)
#   Linux   : Tauri .deb (installs the udev rule) + AppImage + best-effort Flatpak bundle
#   macOS   : best-effort Tauri .app in an architecture-specific .dmg, ad-hoc signed (valid signature,
#             not notarized — no Apple Developer ID). The macOS leg runs continue-on-error so it never
#             blocks the Windows/Linux release if a runner image changes.

name: Build & Release
env:
  JAVA_VERSION: '25'        # GraalVM CE 25 — Quarkus 3.34.1 supports Java 25

on:
  push:
    branches:
      # Disabled: do not build/publish on every push to main. Trigger manually via
      # workflow_dispatch (Actions tab → "Build & Release" → "Run workflow") instead.
      # - main
      - releases/**
  workflow_dispatch:

# One run per branch. The snapshot pre-release only reflects the latest commit, so a
# newer push supersedes an in-flight build instead of queueing behind it (and two runs
# can never race on the same `latest-<branch>` release). A run cancelled mid-publish
# self-heals: the next run's scoped delete+create rebuilds the release cleanly.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildWindows:
    name: Windows installer
    runs-on: windows-latest
    # Exposed so the pre-release job can flag when metadata generation degraded to committed metadata.
    outputs:
      genStatus: ${{ steps.gen.outcome }}
    steps:
      - uses: actions/checkout@v6

      # native-image-job-reports is intentionally OFF: it makes setup-graalvm pass
      # -H:BuildOutputJSONFile pointing at the runner's TEMP on C:, while the build output lives on
      # the workspace drive (D:). GraalVM's BuildArtifactsExporter then relativizes that JSON against
      # the output dir and crashes with "'other' has different root" (cross-drive). That report JSON
      # was the only artifact off the workspace drive; without it every produced artifact stays under
      # target/ on one drive and the native build is clean.
      - name: Set up GraalVM CE
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          cache: 'maven'

      - name: Compute app version
        id: ver
        shell: pwsh
        run: |
          $base = (Select-String -Path pom.xml -Pattern '<project\.baseversion>(.*?)</project\.baseversion>').Matches[0].Groups[1].Value
          $version = "$base.$env:GITHUB_RUN_NUMBER"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "App version: $version"

      # Regenerate reachability metadata for THIS OS before compiling, so the native build
      # consumes proxy/reflection/JNI entries the tracing agent actually observed on Windows
      # rather than relying solely on the committed union. Merge mode (the native-config-gen
      # profile) keeps the other platforms' committed entries; process-resources then copies
      # the refreshed files into target/classes for the package step below. See README.md.
      - name: Generate native-image metadata
        id: gen
        # Non-blocking: a generation failure must never break the release. The build below then
        # falls back to the committed metadata union (ProxyRegistrationCoverageTest still guards
        # missing proxies). The failure is surfaced as a warning here and in the pre-release notes.
        continue-on-error: true
        shell: pwsh
        # Quote the -D property: PowerShell otherwise splits -Dquarkus.native.enabled=false and Maven
        # sees ".native.enabled=false" as a bogus lifecycle phase. (Bash on Linux/macOS needs no quotes.)
        run: mvn -Pnative-config-gen test "-Dquarkus.native.enabled=false" --file pom.xml

      - name: Warn if metadata generation failed
        if: steps.gen.outcome == 'failure'
        shell: pwsh
        run: Write-Output "::warning::Native-image metadata generation failed on Windows; the build used committed metadata (possibly stale)."

      - name: Install rcedit
        run: choco install rcedit --no-progress -y

      - name: Build native image (Windows)
        shell: pwsh
        # `verify` (not `package`) so the native integration tests (failsafe, NativeTestIT) run against
        # the produced binary and fail the release on native-image-only breakage that JVM unit tests
        # cannot see — most importantly NativeTestIT#fontEnumerationProvesAwtLoads, which catches a
        # native image whose awt.dll won't load (empty GraalVM java.dll/jvm.dll shim → dead overlay and
        # font picker). Bake the build-numbered version (<baseversion>.<run>) so the UI footer reports
        # it instead of the bare ${project.version} (2.0-SNAPSHOT). Quote the -D so PowerShell doesn't split it.
        run: mvn -B verify -Pnative "-Dquarkus.application.version=${{ steps.ver.outputs.version }}" --file pom.xml

      - name: Assemble distribution (exe + companion DLLs)
        shell: pwsh
        run: |
          $dist = "target/windows-dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $runner = Get-ChildItem target/*-runner.exe | Select-Object -First 1
          Copy-Item $runner.FullName "$dist/PCPanel.exe"
          # native-image drops the companion DLLs next to the runner in target/.
          Copy-Item target/*.dll $dist/ -ErrorAction SilentlyContinue
          Write-Host "Distribution contents:"
          Get-ChildItem $dist | ForEach-Object { Write-Host "  $($_.Name)" }
          if (-not (Get-ChildItem "$dist/*.dll" -ErrorAction SilentlyContinue)) {
            Write-Warning "No companion DLLs found next to the executable - the installer may be incomplete."
          }
          # GraalVM's java.dll/jvm.dll shims import the JVM/JNI symbols from the exe by its build-time
          # name; renaming the exe to PCPanel.exe (above) breaks that, so awt.dll can't load at runtime.
          # Rewrite the shim import name to match the renamed exe.
          & packaging/windows/patch-shim-imports.ps1 -DistDir $dist -OldName $runner.Name -NewName "PCPanel.exe"
          # native-image produces the exe without an icon; embed the app icon so the binary
          # (and the installer's shortcuts, which reference it) show the PCPanel logo.
          & packaging/windows/embed-icon.ps1 -ExePath "$dist/PCPanel.exe" -IconPath app-icon.ico

      - name: Smoke-test the assembled exe (AWT loads)
        shell: pwsh
        # The native IT runs the un-renamed runner, so it cannot see breakage introduced by the
        # rename/DLL-copy/icon-embed packaging. Run the EXACT shipped exe and assert the overlay font
        # list is non-empty (a broken AWT image returns []), failing the build before it ships.
        run: |
          $exe = (Resolve-Path target/windows-dist/PCPanel.exe).Path
          $p = Start-Process $exe -ArgumentList "skipfilecheck","-Dquarkus.http.port=7799" -PassThru -RedirectStandardOutput smoke.out -RedirectStandardError smoke.err
          $up = $false
          for ($i = 0; $i -lt 60; $i++) { try { if ((Invoke-WebRequest -UseBasicParsing -TimeoutSec 2 http://127.0.0.1:7799/q/health).StatusCode -eq 200) { $up = $true; break } } catch {}; Start-Sleep 1 }
          # Poll the font list: a broken AWT image returns [] (count 0), a working one returns the system
          # fonts (~100+). Retry because the first call cold-loads awt.dll and Java2D, which can lag the
          # health check; measure from the parsed body (not @(Invoke-RestMethod).Count, which collapses a
          # null/empty response to 1 and masked a broken build once already).
          $count = 0; $rawLen = 0
          if ($up) {
            for ($i = 0; $i -lt 30; $i++) {
              try {
                $raw = (Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 http://127.0.0.1:7799/api/overlay/fonts).Content
                $rawLen = $raw.Length
                $count = @([string[]]($raw | ConvertFrom-Json)).Count
                if ($count -gt 0) { break }
              } catch { Write-Host "fonts attempt ${i}: $_" }
              Start-Sleep 1
            }
          }
          # Beyond the AWT/fonts check, exercise the real REST API on the same running exe (#102): on
          # Windows audio and HID fully work, so these must return 200. A 5xx here is the "compiles
          # fine, 500s at runtime" native-image class (missing List<DTO> array reflection,
          # FileSerializer, JNA proxy/pointer registration) on the primary platform.
          $endpointFail = $null
          if ($up) {
            foreach ($ep in '/api/devices','/api/audio/devices','/api/audio/applications','/api/audio/selftest') {
              try {
                $code = (Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 "http://127.0.0.1:7799$ep").StatusCode
                Write-Host "GET $ep -> $code"
                if ($code -ne 200) { $endpointFail = "$ep returned $code" }
              } catch { $endpointFail = "$ep threw $($_.Exception.Message)" }
            }
          } else { $endpointFail = 'server never became ready' }
          # Verify the in-UI Quit button actually shuts the exe down (POST /api/system/quit ->
          # Quarkus.asyncExit). Stop-Process below is only a fallback if quit didn't terminate it.
          $quitFail = $null
          if ($up -and -not $endpointFail) {
            try { Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 -Method Post "http://127.0.0.1:7799/api/system/quit" | Out-Null } catch {}
            if ($p.WaitForExit(10000)) { Write-Host "Quit OK: PCPanel.exe shut down on request." }
            else { $quitFail = 'process did not exit within 10s of POST /api/system/quit' }
          }
          $log = "$env:USERPROFILE\.pcpanel\logs\logging.log"
          if (Test-Path $log) { Select-String -Path $log -Pattern 'UnsatisfiedLink|Can.t load library|Could not enumerate' | Select-Object -First 3 | ForEach-Object { Write-Host "LOG> $($_.Line)" } }
          try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          Write-Host "Assembled PCPanel.exe font families: $count (raw body $rawLen bytes)"
          if ($count -lt 10) {
            if (Test-Path smoke.out) { Get-Content smoke.out | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
            throw "Assembled PCPanel.exe enumerated only $count font families - AWT did not load; the shipped installer would have a dead overlay and font picker."
          }
          if ($endpointFail) {
            if (Test-Path smoke.out) { Get-Content smoke.out | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
            throw "Assembled PCPanel.exe REST smoke failed: $endpointFail (a 5xx usually means a native-image reflection/registration gap)."
          }
          if ($quitFail) {
            if (Test-Path smoke.out) { Get-Content smoke.out | Select-Object -Last 40 | ForEach-Object { Write-Host $_ } }
            throw "Assembled PCPanel.exe quit check failed: $quitFail"
          }

      # --- Wrap the validated backend in the Tauri desktop shell -----------------------------------
      # The smoke-tested target/windows-dist (PCPanel.exe + patched companion DLLs) becomes the Tauri
      # app's bundled `backend/` resource; the shell spawns it and owns the window/tray. The NSIS
      # installer Tauri emits replaces the old Inno Setup one (still per-user, no admin).
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stage backend into the Tauri shell
        shell: pwsh
        run: |
          $dest = "src-tauri/backend"
          Get-ChildItem $dest -Exclude '.gitkeep','README.md' | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item target/windows-dist/* $dest/ -Recurse -Force
          '{ "version": "${{ steps.ver.outputs.version }}" }' | Set-Content src-tauri/version-override.json

      - name: Build Tauri installer (NSIS)
        shell: pwsh
        # npx fetches the prebuilt Tauri CLI (no cargo compile of the CLI); -c merges the version.
        run: |
          Push-Location src-tauri
          npx --yes '@tauri-apps/cli@^2' build -c version-override.json
          Pop-Location

      - name: Store artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: ./src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  buildLinux:
    name: Linux .deb + AppImage
    runs-on: ubuntu-latest
    # Exposed so the pre-release job can flag when metadata generation degraded to committed metadata.
    outputs:
      genStatus: ${{ steps.gen.outcome }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up GraalVM CE
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'
          cache: 'maven'

      - name: Compute app version
        id: ver
        run: |
          base=$(grep -oP '(?<=<project\.baseversion>)[^<]+' pom.xml | head -1)
          echo "version=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Regenerate reachability metadata for THIS OS before compiling (see the Windows job for the
      # rationale). Runs under xvfb because the native-config-gen profile sets java.awt.headless=false
      # and the generation-only keystroke test synthesises a key press that loads libX11/libXtst.
      - name: Generate native-image metadata
        id: gen
        # Non-blocking (see the Windows job): a generation failure must never break the release;
        # the build falls back to committed metadata and the failure is surfaced as a warning.
        continue-on-error: true
        run: xvfb-run -a mvn -Pnative-config-gen test -Dquarkus.native.enabled=false --file pom.xml

      - name: Warn if metadata generation failed
        if: steps.gen.outcome == 'failure'
        run: echo "::warning::Native-image metadata generation failed on Linux; the build used committed metadata (possibly stale)."

      - name: Build native image (Linux)
        # A unit test (VolumeOverlayNativeTest) constructs a Swing overlay window, which throws
        # HeadlessException on the display-less runner. Run the whole build under a virtual X server
        # so the AWT/Swing tests have a display; native-image compilation itself is headless-safe.
        # Bake the build-numbered version (<baseversion>.<run>) into the app so the UI footer reports it
        # instead of the bare ${project.version} (2.0-SNAPSHOT). The Flatpak job reuses this binary, so it
        # inherits the same version.
        run: xvfb-run -a mvn -B package -Pnative -Dquarkus.application.version=${{ steps.ver.outputs.version }} --file pom.xml

      - name: Smoke-test the native binary (boots and serves)
        # Boot the freshly built runner and assert the REST API answers — the same cheap, high-value
        # check the macOS job runs, which catches the "compiles fine, 500s at runtime" native-image
        # class (#102). /api/devices is required (HID + device layer must serialize). /api/audio/* is
        # lenient: the CI runner has no PulseAudio and Linux audio degrades to a no-op ISndCtrl by
        # design, so a non-200 there warns rather than fails. Mirrors the macOS intent — NOT
        # continue-on-error (a real runtime regression turns this job red), but preRelease gates on the
        # job outcome and a red Linux job is meaningful since Linux is a shipped platform.
        run: |
          exe=$(ls target/*-runner | head -1)
          bash packaging/smoke-test.sh "$exe" --port 7766 \
            --require /api/devices \
            --lenient /api/audio/devices --lenient /api/audio/applications --lenient /api/audio/selftest \
            --quit-check

      # Cache the bundled kdotool download (Apache-2.0) across runs; the key changes only when
      # fetch-kdotool.sh (which pins the version + sha256) changes, so it is downloaded once per pin.
      - name: Cache kdotool
        uses: actions/cache@v4
        with:
          path: ~/.cache/pcpanel-kdotool
          key: kdotool-${{ hashFiles('packaging/linux/fetch-kdotool.sh') }}

      # --- Wrap the validated backend in the Tauri desktop shell -----------------------------------
      # The smoke-tested native runner + its companion .so libs + kdotool become the Tauri app's
      # bundled `backend/` resource; Tauri then emits the .deb and AppImage (replacing the hand-written
      # build-deb.sh / build-appimage.sh). The .deb installs the udev rule via bundle.linux.deb.files.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Stage backend into the Tauri shell
        run: |
          set -euxo pipefail
          dest=src-tauri/backend
          find "$dest" -mindepth 1 ! -name '.gitkeep' ! -name 'README.md' -exec rm -rf {} +
          cp "$(ls target/*-runner | head -1)" "$dest/PCPanel"
          chmod +x "$dest/PCPanel"
          cp target/*.so "$dest/" 2>/dev/null || true
          # kdotool (Apache-2.0): the focused-window helper, kept beside the backend binary so
          # LinuxProcessHelper finds it as a sibling (see CLAUDE.md). Cached above per pin.
          bash packaging/linux/fetch-kdotool.sh "$dest"
          echo '{ "version": "${{ steps.ver.outputs.version }}" }' > src-tauri/version-override.json

      - name: Build Tauri packages (.deb + AppImage)
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'   # CI runners have no FUSE
          NO_STRIP: 'true'
        run: |
          cd src-tauri
          npx --yes '@tauri-apps/cli@^2' build -c version-override.json

      - name: Store .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: ./src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Store AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: ./src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      # Collect the prebuilt Tauri shell binary under a stable name for the Flatpak hand-off.
      - name: Collect Tauri shell binary
        run: cp src-tauri/target/release/PCPanel target/pcpanel-shell

      # Hand the backend binary + companion .so libraries AND the Tauri shell to the buildFlatpak job,
      # which runs in its own container. This is an inter-job hand-off, not a release asset — preRelease
      # strips it before publishing.
      - name: Upload native binaries for the Flatpak job
        uses: actions/upload-artifact@v7
        with:
          name: linux-native
          path: |
            target/*-runner
            target/*.so
            target/pcpanel-shell
          if-no-files-found: error

  # Flatpak runs in its own job inside bilelmoussaoui/flatpak-github-actions:gnome-47, which ships the
  # GNOME Platform + SDK 47 — needed because the Tauri webview links WebKitGTK, which the bare
  # freedesktop runtime lacks (the GNOME runtime bundles it). The module is buildsystem: simple (it just
  # installs the prebuilt shell + backend — no compile). Best-effort: the flatpak-builder step is
  # continue-on-error so a failure never blocks the release.
  buildFlatpak:
    name: Linux Flatpak (best-effort)
    needs: buildLinux
    runs-on: ubuntu-latest
    # Job-level continue-on-error: even a container-start failure (bad image, infra) must not fail the
    # run or block the release. preRelease gates only on the required Windows/Linux jobs (see its `if`).
    continue-on-error: true
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Compute app version
        id: ver
        run: |
          base=$(grep -oP '(?<=<project\.baseversion>)[^<]+' pom.xml | head -1)
          echo "version=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Download native binary
        uses: actions/download-artifact@v8
        with:
          name: linux-native
          path: native

      # Same cache as the buildLinux job: kdotool is downloaded once per pin (see fetch-kdotool.sh).
      - name: Cache kdotool
        uses: actions/cache@v4
        with:
          path: ~/.cache/pcpanel-kdotool
          key: kdotool-${{ hashFiles('packaging/linux/fetch-kdotool.sh') }}

      - name: Stage manifest sources
        run: |
          set -euxo pipefail
          # The manifest resolves its `sources: path:` entries relative to its own directory, so stage
          # everything it references next to a copy of the manifest (mirrors the previous host step).
          build=flatpak-build
          mkdir -p "$build"
          cp packaging/linux/flatpak/com.getpcpanel.PCPanel.yml "$build/"
          cp packaging/linux/flatpak/pcpanel-launcher.sh "$build/"
          cp packaging/linux/flatpak/host-spawn-wrapper.sh "$build/"
          cp packaging/linux/flatpak/kdotool-wrapper.sh "$build/"
          cp packaging/linux/com.getpcpanel.PCPanel.desktop "$build/"
          cp packaging/linux/com.getpcpanel.PCPanel.metainfo.xml "$build/"
          cp app-icon.png "$build/"
          # Prebuilt Tauri shell binary — the Flatpak entry point.
          cp native/pcpanel-shell "$build/pcpanel-shell"
          chmod +x "$build/pcpanel-shell"
          # kdotool binary + Apache-2.0 license bundled inside the sandbox (see manifest).
          bash packaging/linux/fetch-kdotool.sh "$build"
          # Backend executable + companion .so libraries under backend/ (the shell spawns it from there).
          stage=$(mktemp -d)
          mkdir -p "$stage/backend"
          cp "$(ls native/*-runner | head -1)" "$stage/backend/PCPanel"
          cp native/*.so "$stage/backend/" 2>/dev/null || true
          tar -czf "$build/pcpanel-native.tar.gz" -C "$stage" .

      - name: Build Flatpak bundle
        id: flatpak
        continue-on-error: true
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: PCPanel-${{ steps.ver.outputs.version }}.flatpak
          manifest-path: flatpak-build/com.getpcpanel.PCPanel.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: x86_64

      - name: Report Flatpak result
        if: steps.flatpak.outcome != 'success'
        run: echo "::warning::Flatpak bundle failed to build; releasing .deb + AppImage only."

      - name: Store Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-flatpak
          path: PCPanel-*.flatpak
          if-no-files-found: ignore

  buildMac:
    name: macOS .dmg (best-effort)
    # A native image is architecture-specific machine code, so an Apple Silicon (arm64) build does NOT
    # run on Intel Macs (and Rosetta only goes x86_64 -> arm64, not the reverse). We therefore build
    # both architectures:
    #   - macos-latest   : Apple Silicon (arm64). Tracks GitHub's current image so it cannot be retired
    #                      out from under us (as the pinned macos-13 was).
    #   - macos-15-intel : Intel (x86_64), GitHub's free successor to the retired macos-13 Intel image.
    # The sources are architecture-independent; each runner just emits its own arch's binary + .dmg.
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up GraalVM CE
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'
          cache: 'maven'

      - name: Compute app version
        id: ver
        run: |
          base=$(grep -oE '<project\.baseversion>[^<]+' pom.xml | head -1 | sed 's/<project\.baseversion>//')
          echo "version=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      # Regenerate reachability metadata for THIS OS before compiling (see the Windows job for the
      # rationale). Best-effort like the rest of the macOS leg: the headless runner makes the AWT
      # generation tests fail, but merge mode persists whatever was captured before the failure, and
      # a failure here must not block the Windows/Linux release.
      - name: Generate native-image metadata
        id: gen
        continue-on-error: true
        run: mvn -Pnative-config-gen test -Dquarkus.native.enabled=false --file pom.xml

      - name: Warn if metadata generation failed
        if: steps.gen.outcome == 'failure'
        run: echo "::warning::Native-image metadata generation failed on macOS (${{ matrix.runner }}); the build used committed metadata (possibly stale)."

      # macOS detection (os.detected.name) resolves pcpanel.build.os to "osx", so the @MacBuild
      # beans are included automatically; no extra flags are needed.
      - name: Build native image (macOS)
        id: build
        continue-on-error: true
        # Bake the build-numbered version (<baseversion>.<run>) into the app so the UI footer reports it
        # instead of the bare ${project.version} (2.0-SNAPSHOT).
        run: mvn -B package -Pnative -Dquarkus.application.version=${{ steps.ver.outputs.version }} --file pom.xml

      - name: Smoke-test the native binary (boots and serves)
        # Gate on the bare runner BEFORE Tauri wraps it — the shell spawns this exact binary, so it must
        # boot and serve. Same shared check as Linux/the old job (boots, Quarkus binds, REST round-trips
        # through JSON → guards the native-image serialization footguns in CLAUDE.md). On macOS audio +
        # HID fully work, so /api/audio/* are required. NOT continue-on-error: a runtime regression turns
        # the job red (preRelease still gates only on Windows/Linux, so it never blocks the release).
        if: steps.build.outcome == 'success'
        run: |
          set -euxo pipefail
          bin=$(ls target/*-runner | head -1)
          bash packaging/smoke-test.sh "$bin" --port 7654 \
            --require /api/devices --require /api/audio/devices --require /api/audio/applications \
            --require /api/audio/selftest \
            --require-hid --quit-check

      - name: Set up Rust
        if: steps.build.outcome == 'success'
        uses: dtolnay/rust-toolchain@stable

      - name: Stage backend into the Tauri shell (ad-hoc sign nested Mach-O)
        id: assemble
        if: steps.build.outcome == 'success'
        # The runner + companion .dylib files become the Tauri app's bundled backend/ resource. We
        # ad-hoc sign every nested Mach-O here (inside-out), BEFORE Tauri seals the outer .app — else the
        # bundle is half-signed and macOS reports it "damaged" (issue #101). No Developer ID, so this is
        # ad-hoc (--sign -): a structurally valid signature, not notarized.
        run: |
          set -euxo pipefail
          dest=src-tauri/backend
          find "$dest" -mindepth 1 ! -name '.gitkeep' ! -name 'README.md' -exec rm -rf {} +
          cp "$(ls target/*-runner | head -1)" "$dest/PCPanel"
          chmod +x "$dest/PCPanel"
          cp target/*.dylib "$dest/" 2>/dev/null || true
          xattr -cr "$dest"
          find "$dest" -type f \( -name '*.dylib' -o -name '*.jnilib' -o -name '*.so' \) \
            -exec codesign --force --sign - --timestamp=none {} +
          codesign --force --sign - --timestamp=none "$dest/PCPanel"
          echo '{ "version": "${{ steps.ver.outputs.version }}" }' > src-tauri/version-override.json

      - name: Build Tauri app (.app, ad-hoc signed)
        if: steps.assemble.outcome == 'success'
        # Tauri produces only the .app here (targets exclude dmg). APPLE_SIGNING_IDENTITY="-" makes it
        # ad-hoc sign the .app (the issue-#101 fix); it seals over the already-signed nested backend
        # Mach-O. Not notarized (no Developer ID). The .dmg is built below via hdiutil — create-dmg's
        # AppleScript window styling is unreliable on CI.
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: |
          set -euxo pipefail
          cd src-tauri
          npx --yes '@tauri-apps/cli@^2' build -c version-override.json

      - name: Verify signature and create .dmg (hdiutil)
        if: steps.assemble.outcome == 'success'
        run: |
          set -euxo pipefail
          arch=$(uname -m)   # arm64 or x86_64
          app="src-tauri/target/release/bundle/macos/PCPanel.app"
          codesign --verify --deep --strict --verbose=4 "$app"
          codesign --display --verbose=4 "$app" || true
          dmg="target/PCPanel-${{ steps.ver.outputs.version }}-${arch}.dmg"
          # Size the image explicitly (bundle size + headroom) so hdiutil's auto-size can't come up short
          # on the large signed binary; build writable then convert to the compressed read-only UDZO.
          appkb=$(du -sk "$app" | awk '{print $1}')
          sizemb=$(( appkb / 1024 + 300 ))
          hdiutil create -volname PCPanel -srcfolder "$app" -ov -format UDRW -size "${sizemb}m" target/PCPanel-rw.dmg
          hdiutil convert target/PCPanel-rw.dmg -format UDZO -ov -o "$dmg"
          rm -f target/PCPanel-rw.dmg
          ls -lh "$dmg"

      - name: Store .dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg-${{ runner.arch }}
          path: ./target/PCPanel-*.dmg
          if-no-files-found: ignore

  preRelease:
    name: Pre-release
    needs:
      - buildWindows
      - buildLinux
      - buildFlatpak
      - buildMac
    runs-on: ubuntu-latest
    # Wait for every build (so a successful Flatpak/macOS artifact is ready to attach) but only require
    # the Windows and Linux installers — Flatpak and macOS are best-effort and must never block a release.
    if: ${{ !cancelled() && needs.buildWindows.result == 'success' && needs.buildLinux.result == 'success' }}
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Extract Maven project version
        run: echo "version=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
        id: project

      - name: Compute tag name
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          safe_branch=$(echo "$branch" | sed 's/[^A-Za-z0-9._-]/-/g')
          echo "TAG_NAME=latest-$safe_branch" >> $GITHUB_ENV

      - name: Remove existing pre-release for this branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only delete THIS branch's snapshot pre-release (tag == $TAG_NAME).
          # Other branches' snapshots and every stable (non-prerelease) release are
          # left untouched — deleting all prereleases repo-wide would wipe unrelated
          # snapshots such as the 1.8 `latest-windows-main` build.
          gh api repos/{owner}/{repo}/releases \
            --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" \
            | xargs -r -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      - name: Remove previous tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api /repos/{owner}/{repo}/git/refs/tags/"$TAG_NAME" >/dev/null 2>&1; then
            gh api --method DELETE -H "Accept: application/vnd.github.v3+json" /repos/{owner}/{repo}/git/refs/tags/"$TAG_NAME"
            echo "Deleted tag $TAG_NAME"
          else
            echo "Tag $TAG_NAME does not exist; skipping delete"
          fi

      - name: Create Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          WIN_GEN: ${{ needs.buildWindows.outputs.genStatus }}
          LIN_GEN: ${{ needs.buildLinux.outputs.genStatus }}
        run: |
          notes="$(sed '/##/Q' CHANGELOG.md)"
          # The gen step is non-blocking, so a build can still succeed while its native-image
          # metadata silently fell back to the committed (possibly stale) union. Flag that here
          # so a degraded build is visible on the release page, not just buried in the run log.
          warnings=""
          if [ "$WIN_GEN" = "failure" ]; then
            warnings="${warnings}- ⚠️ Windows: native-image metadata generation failed; built with committed metadata (possibly stale)."$'\n'
          fi
          if [ "$LIN_GEN" = "failure" ]; then
            warnings="${warnings}- ⚠️ Linux: native-image metadata generation failed; built with committed metadata (possibly stale)."$'\n'
          fi
          if [ -n "$warnings" ]; then
            notes="${notes}"$'\n\n'"### ⚠️ Build warnings"$'\n'"${warnings}"
          fi
          printf '%s' "$notes" > "$RUNNER_TEMP/release-notes.md"
          gh release create "$TAG_NAME" \
            --prerelease \
            --title "v${{ steps.project.outputs.version }} Pre-Release (${{ env.GITHUB_RUN_NUMBER }})" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # linux-native (raw runner + .so + Tauri shell) is the buildLinux -> buildFlatpak hand-off,
          # not a release asset; drop it so only the installers/bundles are published.
          rm -f dist/*-runner dist/*.so dist/pcpanel-shell
          gh release upload "$TAG_NAME" dist/*
          gh release edit "$TAG_NAME" --draft=false
